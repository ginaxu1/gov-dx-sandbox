global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'opendif-core'
    environment: 'local'

scrape_configs:
  # Exchange Services
  - job_name: consent-engine
    metrics_path: /metrics
    static_configs:
      - targets:
          - consent-engine:8081
        labels:
          service: 'consent-engine'
          port: '8081'

  # Root Level Services
  - job_name: audit-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - audit-service:3001
        labels:
          service: 'audit-service'
          port: '3001'

